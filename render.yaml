services:
  # Django API Backend
  - type: web
    name: pharmacy-api
    env: python
    plan: free
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn core.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: pharmacy-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

  # Node.js Socket Server
  - type: web
    name: pharmacy-socket
    env: node
    plan: free
    rootDir: node_backend
    buildCommand: "npm install"
    startCommand: "node server.js"
    envVars:
      - key: PORT
        value: 10000

  # React Frontend
  - type: static
    name: pharmacy-frontend
    env: static
    plan: free
    rootDir: pharmacy
    buildCommand: "npm install && npm run build"
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        value: https://pharmacy-api.onrender.com

databases:
  - name: pharmacy-db
    plan: free
